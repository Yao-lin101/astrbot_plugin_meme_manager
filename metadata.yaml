name: astrbot_plugin_meme_manager
desc: Astrbot表情包管理器重大升级版！基于原作者 v3.2 版进行深度重构与定制，新增了被动群聊 AI 自动“偷图”（可配置概率和重复出现次数阈值）与主动指令“偷图”收录功能、支持表情包人格分类与绑定、人格专属标签智能拼接、重新设计了标签管理系统。WebUI 支持按新增时间分级展示（今天/昨天/最近一周/更早以前）、顶部横幅上传及批量导入已存表情。(/表情管理 开启管理后台 开启)
help: 功能包含： 1. AI 智能识别并发送表情包（支持 <emotions>标签</emotions> 格式与向量模型） 2. AI 自动“偷表情”收录至指定人格表情库（被动自动收集与主动引用收集） 3. /表情管理 开启管理后台 - 启动 WebUI 界面（支持分级时间归类、全部展示、批量导入、拖拽和右键批量等） 4. /表情管理 查看图库 5. /表情管理 添加表情 [类别] 6. 支持 Stardots/Cloudflare R2 图床云端同步
version: v4.2.0
author: anka & Yao-lin101
repo: https://github.com/Yao-lin101/astrbot_plugin_meme_manager
