name: astrbot_plugin_meme_manager
desc: Astrbot表情包管理器向量版！基于原作者 v3.2 版进行深度重构与升级。引入了基于向量（Embedding）与回复文本的双通道混合检索，支持本地表情标签向量自动增量同步与缓存重构；支持大模型表情包发送工具 (LLM Tool) 及两步工作流自动注入；新增表情包发送混合模式 (Hybrid Mode)，允许同时激活标签和工具匹配；将人格偏好配置迁移至插件数据库管理，支持 WebUI 独立栏目配置使用偏好多选与多行收集偏好定制；WebUI 支持按新增时间分级展示、通栏上传、批量导入、相似度表情查重清理，以及多模态 AI 批量重新分析标签与描述（支持临时修改 Prompt 与现有标签参考引入）。
help: 功能包含： 1. AI 智能检索发送表情包（支持情绪标签、LLM Tool 工具以及双轨混合模式切换） 2. 人格专属表情偏好配置（WebUI 标签多选与多行描述快速配置，自动注入人设） 3. AI 自动“偷表情”收录（内置视觉相似度去重防止重复收录） 4. WebUI 可视化管理（支持批量导入、视觉相似度查重清理、批量重新分析及图床同步）
version: v4.8.0
author: anka & Yao-lin101
repo: https://github.com/Yao-lin101/astrbot_plugin_meme_manager
