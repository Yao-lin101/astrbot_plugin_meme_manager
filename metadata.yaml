name: astrbot_plugin_meme_manager
desc: Astrbot表情包管理器向量版！基于原作者 v3.2 版进行深度重构与升级。引入了基于向量（Embedding）与回复文本的双通道混合检索，支持本地表情标签向量自动增量同步与缓存重构；全面适配 <emotions> 标签格式并提供底层格式保护；集成被动群聊 AI 自动“偷图”、主动指令收录、多模态自动标签以及人格专属标签和绑定。WebUI 支持按新增时间分级展示（今天/昨天/最近一周/更早以前）、通栏上传、批量导入、工具栏吸顶及视觉相似度表情查重去重。
help: 功能包含： 1. AI 智能识别并发送表情包（支持 <emotions> 标签与向量双通道检索模型） 2. AI 自动“偷表情”收录（内置视觉相似度去重防止重复收录） 3. /表情管理 查看图库 / 重构向量缓存 4. WebUI 可视化管理（支持批量导入、视觉相似度查重清理及图床同步）
version: v4.5.0
author: anka & Yao-lin101
repo: https://github.com/Yao-lin101/astrbot_plugin_meme_manager
