name: astrbot_plugin_meme_manager
desc: Astrbot表情包管理器重大升级版！基于原作者 v3.2 版进行深度重构与定制，新增了 AI 自动“偷图”（表情收录）功能、支持表情包人格分类与绑定、重新设计并重构了标签管理系统与大部分后端逻辑及数据库脚本。提供便捷的可视化 WebUI 管理界面(/表情管理 开启管理后台)，所有 prompt 提示词会根据表情库结构和绑定人格自动维护。
help: 功能包含： 1. AI 智能识别并发送表情包（支持 &&标签&& 符号与情感模型） 2. AI 自动“偷表情”收录至指定人格表情库（通过 llm_tool 接口） 3. /表情管理 开启管理后台 - 启动 WebUI 界面（支持“全部”展示、拖拽、右键批量操作等） 4. /表情管理 查看图库 5. /表情管理 添加表情 [类别] 6. 支持 Stardots/Cloudflare R2 图床云端同步
version: v4.1.0
author: anka & Yao-lin101
repo: https://github.com/Yao-lin101/astrbot_plugin_meme_manager
