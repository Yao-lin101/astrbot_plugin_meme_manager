name: astrbot_plugin_meme_manager
desc: Astrbot表情包管理器向量版！基于原作者 v3.2 版进行深度重构与升级。引入了基于向量（Embedding）与回复文本的双通道混合检索，支持本地表情标签向量自动增量同步与缓存重构；全面适配 <emotions> 标签格式并提供底层格式保护；集成被动群聊 AI 自动“偷图”、主动指令收录、多模态自动分类以及人格专属标签和绑定。WebUI 支持按新增时间分级展示（今天/昨天/最近一周/更早以前）、通栏上传及批量导入。(/表情管理 开启管理后台 开启)
help: 功能包含： 1. AI 智能识别并发送表情包（支持 <emotions> 标签与向量双通道检索模型） 2. AI 自动“偷表情”收录至指定分类（支持被动收集、引用收集与多模态自动标签生成） 3. /表情管理 开启管理后台 - 启动 WebUI（支持时间分级展示、批量导入、重构向量等） 4. /表情管理 查看图库 / 重构向量缓存 5. 支持 Stardots/Cloudflare R2 图床同步
version: v4.3.0
author: anka & Yao-lin101
repo: https://github.com/Yao-lin101/astrbot_plugin_meme_manager
